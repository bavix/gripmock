# yaml-language-server: $schema=https://bavix.github.io/gripmock/schema/stub.json
- service: types.TypeService
  method: GetAllTypes
  input:
    equals:
      name: "test"
  output:
    data:
      string_field: "hello world"
      int32_field: 42
      int64_field: 42
      uint32_field: 42
      uint64_field: 42
      float_field: 3.14
      double_field: 3.14159
      bool_field: true

- service: types.TypeService
  method: GetInts
  input:
    equals:
      name: "ints"
  output:
    data:
      int32_zero: 0
      int32_pos: 2147483647
      int32_neg: -2147483648
      int64_zero: 0
      int64_pos: 9223372036854775807
      int64_neg: -9223372036854775808
      int64_large: 9007199254740992
      int64_max: 9223372036854775807
      int64_min: -9223372036854775808

- service: types.TypeService
