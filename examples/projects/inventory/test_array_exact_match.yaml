# yaml-language-server: $schema=https://bavix.github.io/gripmock/schema/stub.json

# Issue #840: Array exact match - order matters
- service: inventory.InventoryService
  method: GetResourceDecorationByIPsStream
  input:
    equals:
      k8s_cluster_id: "scale-test-cluster"
      ips: ["10.64.0.1", "10.64.0.2"]
  output:
    data:
      ips_to_decorations:
        "10.64.0.1":
          decoration: "web-frontend"
          environment: "production"
        "10.64.0.2":
          decoration: "api-backend"
          environment: "staging"