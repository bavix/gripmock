- service: inventory.InventoryService
  method: GetResourceDecorationByIPsStream
  input:
    matches:
      k8s_cluster_id: "^test-matches$"
      ips: ["^10\\.0\\.2\\.[0-9]+$", "^10\\.0\\.2\\.[0-9]+$"]
  output:
    data:
      ips_to_decorations:
        "10.0.2.77":
          decoration: "api-backend"
          environment: "staging"
        "10.0.2.88":
          decoration: "api-backend"
          environment: "staging"
