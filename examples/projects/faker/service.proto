edition = "2024";

package example;

import "google/protobuf/timestamp.proto";

service UserService {
  rpc GetProfile (ProfileRequest) returns (ProfileResponse) {}
  rpc GetSubscription (SubscriptionRequest) returns (Subscription) {}
}

message ProfileRequest {
  string id = 1;
}

message ProfileResponse {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string city = 5;
  double lat = 6;
  double lon = 7;
  string ip = 8;
  string user_agent = 9;
  string company = 10;
  string product = 11;
  string bio = 12;
  string created_at = 13;
  string account_id = 14;
}

message SubscriptionRequest {
  string user_id = 1;
}

message Subscription {
  string subscription_id = 1;
  string plan_name = 2;
  double price = 3;
  string currency = 4;
  string status = 5;
  string billing_email = 6;
  string billing_name = 7;
  string company_name = 8;
  string description = 9;
  int32 max_users = 10;
  int32 trial_days = 11;
  google.protobuf.Timestamp start_date = 12;
  google.protobuf.Timestamp next_billing_date = 13;
  google.protobuf.Timestamp cancelled_at = 14;
}
