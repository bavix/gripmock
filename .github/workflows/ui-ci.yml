name: ui ci

on:
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/ui-ci.yml"
  push:
    branches: [master]
    paths:
      - "ui/**"
      - ".github/workflows/ui-ci.yml"

permissions:
  contents: read

jobs:
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Type-check
        run: npm run type-check
      - name: Lint
        run: npx eslint src --no-fix --max-warnings 5
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
