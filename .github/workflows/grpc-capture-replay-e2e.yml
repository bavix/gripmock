name: gRPC Capture Replay E2E

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: grpc-capture-replay-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  GRPCTESTIFY_VERSION: "1.4.6"
  SOURCE_GRPC_PORT: "4111"
  TARGET_GRPC_PORT: "4770"
  TARGET_HTTP_PORT: "4771"

jobs:
  capture-replay-offline:
    name: "Capture Replay Offline"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up cache for grpctestify
        uses: actions/cache@v5
        with:
          path: grpctestify
          key: deps-cache-${{ runner.os }}-grpctestify-rust-${{ env.GRPCTESTIFY_VERSION }}

      - name: Install grpctestify
        run: |
          pwd >> "$GITHUB_PATH"

          if [ ! -f grpctestify ]; then
            case "$RUNNER_ARCH" in
              X64) grpctestify_asset="grpctestify-linux-amd64.tar.gz" ;;
              ARM64) grpctestify_asset="grpctestify-linux-arm64.tar.gz" ;;
              *) echo "Unsupported runner arch: $RUNNER_ARCH"; exit 1 ;;
            esac

            curl -sSL "https://github.com/gripmock/grpctestify-rust/releases/download/v${{ env.GRPCTESTIFY_VERSION }}/$grpctestify_asset" | tar -xz
            chmod +x grpctestify
          fi

      - name: Build gripmock binary
        run: |
          go build -o "$RUNNER_TEMP/gripmock" .

      - name: Start + check source examples server
        run: |
          GRPC_PORT="$SOURCE_GRPC_PORT" HTTP_PORT=0 "$RUNNER_TEMP/gripmock" examples -s examples >"$RUNNER_TEMP/gripmock-source.log" 2>&1 & echo $! >"$RUNNER_TEMP/gripmock-source.pid"
          GRPC_PORT="$SOURCE_GRPC_PORT" "$RUNNER_TEMP/gripmock" check --timeout=60s --silent

      - name: Start + check capture target server
        run: |
          GRPC_PORT="$TARGET_GRPC_PORT" HTTP_PORT="$TARGET_HTTP_PORT" "$RUNNER_TEMP/gripmock" grpc+capture://localhost:${SOURCE_GRPC_PORT} >"$RUNNER_TEMP/gripmock-target.log" 2>&1 & echo $! >"$RUNNER_TEMP/gripmock-target.pid"
          GRPC_PORT="$TARGET_GRPC_PORT" "$RUNNER_TEMP/gripmock" check --timeout=60s --silent

      - name: Warm up capture from source
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${TARGET_GRPC_PORT}" ./grpctestify examples

      - name: Stop source server
        run: |
          [ -f "$RUNNER_TEMP/gripmock-source.pid" ] && kill -INT "$(cat "$RUNNER_TEMP/gripmock-source.pid")" 2>/dev/null || true
          sleep 1

      - name: Replay full suite from captured stubs
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${TARGET_GRPC_PORT}" ./grpctestify examples

      - name: Replay header-sensitive greeter cases
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${TARGET_GRPC_PORT}" ./grpctestify -p 8 \
            examples/projects/greeter/case_say_hello_alex.gctf \
            examples/projects/greeter/case_say_hello_alex_headers.gctf

      - name: Stop servers
        if: always()
        run: |
          for pid_file in "$RUNNER_TEMP/gripmock-target.pid" "$RUNNER_TEMP/gripmock-source.pid"; do
            [ -f "$pid_file" ] && kill -INT "$(cat "$pid_file")" 2>/dev/null || true
          done
          sleep 1

      - name: Dump logs on failure
        if: failure()
        run: |
          for f in "$RUNNER_TEMP/gripmock-source.log" "$RUNNER_TEMP/gripmock-target.log"; do
            if [ -f "$f" ]; then
              echo "----- $f -----"
              cat "$f"
            fi
          done
