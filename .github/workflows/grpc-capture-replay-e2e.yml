name: gRPC Capture Replay E2E

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: grpc-capture-replay-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  GRPCTESTIFY_VERSION: "1.6.1"
  SOURCE_GRPC_PORT: "4111"
  TARGET_GRPC_PORT: "4770"
  TARGET_HTTP_PORT: "4771"

jobs:
  capture-replay-offline:
    name: "Capture Replay Offline"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install grpctestify
        uses: gripmock/grpctestify-action@v1
        with:
          install-only: true
          version: ${{ env.GRPCTESTIFY_VERSION }}

      - name: Build gripmock binary
        run: |
          go build -o "$RUNNER_TEMP/gripmock" .

      - name: Start + check source examples server
        run: |
          GRPC_PORT="$SOURCE_GRPC_PORT" HTTP_PORT=0 "$RUNNER_TEMP/gripmock" examples -s examples >"$RUNNER_TEMP/gripmock-source.log" 2>&1 & echo $! >"$RUNNER_TEMP/gripmock-source.pid"

          for _ in $(seq 1 60); do
            if GRPC_PORT="$SOURCE_GRPC_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent; then
              break
            fi

            sleep 1
          done

          GRPC_PORT="$SOURCE_GRPC_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent

      - name: Start + check capture target server
        run: |
          GRPC_PORT="$TARGET_GRPC_PORT" HTTP_PORT="$TARGET_HTTP_PORT" "$RUNNER_TEMP/gripmock" "grpc+capture://localhost:${SOURCE_GRPC_PORT}?recordDelay=true" >"$RUNNER_TEMP/gripmock-target.log" 2>&1 & echo $! >"$RUNNER_TEMP/gripmock-target.pid"

          for _ in $(seq 1 60); do
            if GRPC_PORT="$TARGET_GRPC_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent; then
              break
            fi

            sleep 1
          done

          GRPC_PORT="$TARGET_GRPC_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent

      - name: Warm up capture from source
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${TARGET_GRPC_PORT}" grpctestify examples --skip-tags sequential,effects

      - name: Stop source server
        run: |
          [ -f "$RUNNER_TEMP/gripmock-source.pid" ] && kill -INT "$(cat "$RUNNER_TEMP/gripmock-source.pid")" 2>/dev/null || true
          sleep 1

      - name: Replay full suite from captured stubs
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${TARGET_GRPC_PORT}" grpctestify examples --skip-tags sequential,effects

      - name: Replay header-sensitive greeter cases
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${TARGET_GRPC_PORT}" grpctestify -p 8 \
            examples/projects/greeter/case_say_hello_alex.gctf \
            examples/projects/greeter/case_say_hello_alex_headers.gctf

      - name: Stop servers
        if: always()
        run: |
          for pid_file in "$RUNNER_TEMP/gripmock-target.pid" "$RUNNER_TEMP/gripmock-source.pid"; do
            [ -f "$pid_file" ] && kill -INT "$(cat "$pid_file")" 2>/dev/null || true
          done
          sleep 1

      - name: Dump logs on failure
        if: failure()
        run: |
          for f in "$RUNNER_TEMP/gripmock-source.log" "$RUNNER_TEMP/gripmock-target.log"; do
            if [ -f "$f" ]; then
              echo "----- $f -----"
              cat "$f"
            fi
          done
