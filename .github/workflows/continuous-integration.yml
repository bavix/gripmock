name: Continuous Integration
on:
  push:
    branches:
      - "master"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRPCTESTIFY_VERSION: "1.4.3"
  GO_VERSION: "1.26"

jobs:
  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    env:
      GOCOVERDIR: /tmp/cover-unit
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        run: |
          mkdir -p "$GOCOVERDIR"
          go test -cover -covermode=atomic ./... -args -test.gocoverdir="$GOCOVERDIR"
        shell: bash

      - name: Upload unit coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: /tmp/cover-unit

  unit-tests-matrix:
    name: "Unit Tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test ./...

  binary-smoke-tests:
    name: "Binary Smoke (${{ matrix.platform }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build and smoke-test binary (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          bin="$RUNNER_TEMP/gripmock"
          go build -o "$bin" .
          "$bin" --version
          "$bin" --help

          "$bin" --stub=examples examples >"$RUNNER_TEMP/gripmock.log" 2>&1 &
          pid=$!

          cleanup() {
            kill -INT "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          }

          trap cleanup EXIT
          "$bin" check --timeout=60s --silent
          cleanup
          trap - EXIT

      - name: Build and smoke-test binary (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $bin = Join-Path $env:RUNNER_TEMP "gripmock.exe"
          go build -o $bin .

          & $bin --version
          & $bin --help

          $stdout = Join-Path $env:RUNNER_TEMP "gripmock.out.log"
          $stderr = Join-Path $env:RUNNER_TEMP "gripmock.err.log"
          $proc = Start-Process -FilePath $bin -ArgumentList "--stub=examples", "examples" -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru

          try {
            & $bin check --timeout=60s --silent
          }
          finally {
            if ($null -ne $proc) {
              Stop-Process -Id $proc.Id -ErrorAction SilentlyContinue
            }
          }

  goreleaser-check:
    name: "GoReleaser Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Validate GoReleaser config
        run: goreleaser check

      - name: Build snapshot with GoReleaser
        run: goreleaser build --snapshot --clean

  e2e-tests:
    name: "E2E Tests (${{ matrix.platform }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            collect_coverage: true
          - os: macos-latest
            platform: macos
            collect_coverage: false
          - os: windows-latest
            platform: windows
            collect_coverage: false
    env:
      COLLECT_COVERAGE: ${{ matrix.collect_coverage }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up cache for dependencies
        uses: actions/cache@v5
        with:
          path: |
            grpctestify
            grpctestify.exe
          key: deps-cache-${{ runner.os }}-grpctestify-rust-${{ env.GRPCTESTIFY_VERSION }}

      - name: Install dependencies (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          pwd >> "$GITHUB_PATH"

          if [ ! -f grpctestify ]; then
            case "$RUNNER_OS/$RUNNER_ARCH" in
              Linux/X64) grpctestify_asset="grpctestify-linux-amd64.tar.gz" ;;
              Linux/ARM64) grpctestify_asset="grpctestify-linux-arm64.tar.gz" ;;
              macOS/X64) grpctestify_asset="grpctestify-macos-amd64.tar.gz" ;;
              macOS/ARM64) grpctestify_asset="grpctestify-macos-arm64.tar.gz" ;;
              *) echo "Unsupported runner: $RUNNER_OS/$RUNNER_ARCH"; exit 1 ;;
            esac
            curl -sSL "https://github.com/gripmock/grpctestify-rust/releases/download/v${{ env.GRPCTESTIFY_VERSION }}/$grpctestify_asset" | tar -xz
            chmod +x grpctestify
          fi

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "grpctestify.exe")) {
            $grpctestifyZip = if ($env:RUNNER_ARCH -eq "ARM64") { "grpctestify-windows-arm64.zip" } else { "grpctestify-windows-amd64.zip" }
            Invoke-WebRequest -Uri "https://github.com/gripmock/grpctestify-rust/releases/download/v${{ env.GRPCTESTIFY_VERSION }}/$grpctestifyZip" -OutFile "grpctestify.zip"
            Expand-Archive -Path "grpctestify.zip" -DestinationPath "." -Force
            Remove-Item "grpctestify.zip" -Force
          }

          Add-Content -Path $env:GITHUB_PATH -Value (Get-Location)

      - name: Run E2E suite (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          find . -name "*.proto.src" -type f -delete

          bin="$RUNNER_TEMP/gripmock"
          if [ "$COLLECT_COVERAGE" = "true" ]; then
            go build -cover -covermode=atomic -o "$bin" .
            mkdir -p /tmp/cover-e2e /tmp/cover-check
            GOCOVERDIR=/tmp/cover-e2e "$bin" --stub=examples examples &
          else
            go build -o "$bin" .
            "$bin" --stub=examples examples &
          fi
          pid=$!

          cleanup() {
            kill -INT "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          }

          trap cleanup EXIT
          if [ "$COLLECT_COVERAGE" = "true" ]; then
            GOCOVERDIR=/tmp/cover-check "$bin" check --timeout=60s --silent
          else
            "$bin" check --timeout=60s --silent
          fi

          ./grpctestify examples/

      - name: Run E2E suite (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Filter *.proto.src -File | Remove-Item -Force

          $bin = Join-Path $env:RUNNER_TEMP "gripmock.exe"
          if ($env:COLLECT_COVERAGE -eq "true") {
            go build -cover -covermode=atomic -o $bin .
            New-Item -ItemType Directory -Path "/tmp/cover-e2e" -Force | Out-Null
            New-Item -ItemType Directory -Path "/tmp/cover-check" -Force | Out-Null
            $env:GOCOVERDIR = "/tmp/cover-e2e"
            $proc = Start-Process -FilePath $bin -ArgumentList "--stub=examples", "examples" -PassThru
            Remove-Item Env:GOCOVERDIR
          }
          else {
            go build -o $bin .
            $proc = Start-Process -FilePath $bin -ArgumentList "--stub=examples", "examples" -PassThru
          }

          try {
            if ($env:COLLECT_COVERAGE -eq "true") {
              $env:GOCOVERDIR = "/tmp/cover-check"
              & $bin check --timeout=60s --silent
              Remove-Item Env:GOCOVERDIR
            }
            else {
              & $bin check --timeout=60s --silent
            }

            .\grpctestify.exe examples\
          }
          finally {
            if ($null -ne $proc) {
              Stop-Process -Id $proc.Id -ErrorAction SilentlyContinue
            }
          }

      - name: Upload e2e coverage
        if: matrix.collect_coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-e2e
          path: /tmp/cover-e2e

      - name: Upload check coverage
        if: matrix.collect_coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-check
          path: /tmp/cover-check

  e2e-tls-tests:
    name: "E2E TLS (${{ matrix.tls_mode }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tls_mode: tls12
            grpc_tls_cert_file: third_party/tls/tls12/server.crt
            grpc_tls_key_file: third_party/tls/tls12/server.key
            grpc_tls_ca_file: ""
            grpc_tls_min_version: "1.2"
            grpc_tls_client_auth: "false"
            grpctestify_tls_cert_file: ""
            grpctestify_tls_key_file: ""
            grpctestify_tls_ca_file: third_party/tls/tls12/ca.crt
            grpctestify_tls_server_name: localhost
          - tls_mode: tls13
            grpc_tls_cert_file: third_party/tls/tls13/server.crt
            grpc_tls_key_file: third_party/tls/tls13/server.key
            grpc_tls_ca_file: ""
            grpc_tls_min_version: "1.3"
            grpc_tls_client_auth: "false"
            grpctestify_tls_cert_file: ""
            grpctestify_tls_key_file: ""
            grpctestify_tls_ca_file: third_party/tls/tls13/ca.crt
            grpctestify_tls_server_name: localhost
          - tls_mode: mtls
            grpc_tls_cert_file: third_party/tls/mtls/server.crt
            grpc_tls_key_file: third_party/tls/mtls/server.key
            grpc_tls_ca_file: third_party/tls/mtls/ca.crt
            grpc_tls_min_version: "1.2"
            grpc_tls_client_auth: "true"
            grpctestify_tls_cert_file: third_party/tls/mtls/client.crt
            grpctestify_tls_key_file: third_party/tls/mtls/client.key
            grpctestify_tls_ca_file: third_party/tls/mtls/ca.crt
            grpctestify_tls_server_name: localhost
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up cache for dependencies
        uses: actions/cache@v5
        with:
          path: grpctestify
          key: deps-cache-${{ runner.os }}-grpctestify-rust-${{ env.GRPCTESTIFY_VERSION }}

      - name: Install grpctestify
        run: |
          pwd >> "$GITHUB_PATH"

          if [ ! -f grpctestify ]; then
            case "$RUNNER_ARCH" in
              X64) grpctestify_asset="grpctestify-linux-amd64.tar.gz" ;;
              ARM64) grpctestify_asset="grpctestify-linux-arm64.tar.gz" ;;
              *) echo "Unsupported runner arch: $RUNNER_ARCH"; exit 1 ;;
            esac

            curl -sSL "https://github.com/gripmock/grpctestify-rust/releases/download/v${{ env.GRPCTESTIFY_VERSION }}/$grpctestify_asset" | tar -xz
            chmod +x grpctestify
          fi

      - name: Run E2E TLS suite
        run: |
          find . -name "*.proto.src" -type f -delete

          bin="$RUNNER_TEMP/gripmock"
          go build -o "$bin" .

          GRPC_TLS_CERT_FILE="${{ matrix.grpc_tls_cert_file }}" \
          GRPC_TLS_KEY_FILE="${{ matrix.grpc_tls_key_file }}" \
          GRPC_TLS_CA_FILE="${{ matrix.grpc_tls_ca_file }}" \
          GRPC_TLS_MIN_VERSION="${{ matrix.grpc_tls_min_version }}" \
          GRPC_TLS_CLIENT_AUTH="${{ matrix.grpc_tls_client_auth }}" \
          "$bin" --stub=examples examples &
          pid=$!

          cleanup() {
            kill -INT "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          "$bin" check --timeout=60s --silent

          export GRPCTESTIFY_TLS_CA_FILE="${{ matrix.grpctestify_tls_ca_file }}"
          export GRPCTESTIFY_TLS_SERVER_NAME="${{ matrix.grpctestify_tls_server_name }}"
          export GRPCTESTIFY_TLS_CERT_FILE="${{ matrix.grpctestify_tls_cert_file }}"
          export GRPCTESTIFY_TLS_KEY_FILE="${{ matrix.grpctestify_tls_key_file }}"

          ./grpctestify examples/

  coverage-report:
    name: "Coverage Report"
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, e2e-tls-tests]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit
          path: /tmp/cover-unit

      - name: Download e2e coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-e2e
          path: /tmp/cover-e2e

      - name: Download check coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-check
          path: /tmp/cover-check

      - name: Merge all coverage data
        run: |
          mkdir -p /tmp/cover-all
          go tool covdata merge \
            -i=/tmp/cover-unit,/tmp/cover-e2e,/tmp/cover-check \
            -o=/tmp/cover-all

      - name: Generate coverage report
        run: |
          go tool covdata textfmt -i=/tmp/cover-all -o coverage.txt
          go tool covdata percent -i=/tmp/cover-all

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.txt

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.txt
