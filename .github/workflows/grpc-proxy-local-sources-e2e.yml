name: gRPC Proxy Local Sources E2E

on:
  push:
    branches:
      - master
      - plan/**
  pull_request:

concurrency:
  group: grpc-proxy-local-sources-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  GRPCTESTIFY_VERSION: "1.6.1"
  GREETER_PROXY_PORT: "4770"
  GREETER_HTTP_PORT: "4771"
  GREETER_UPSTREAM_PORT: "4111"

jobs:
  proxy-local-sources-no-reflection:
    name: "Proxy with Local Sources (no upstream reflection)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install grpctestify
        uses: gripmock/grpctestify-action@v1
        with:
          install-only: true
          version: ${{ env.GRPCTESTIFY_VERSION }}

      - name: Install grpcurl
        run: go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

      - name: Build gripmock binary
        run: |
          go build -o "$RUNNER_TEMP/gripmock" .

      - name: Start + check upstream greeter server
        run: |
          GRPC_PORT="$GREETER_UPSTREAM_PORT" HTTP_PORT=0 "$RUNNER_TEMP/gripmock" -s examples/projects/greeter examples/projects/greeter >"$RUNNER_TEMP/gripmock-upstream.log" 2>&1 & echo $! >"$RUNNER_TEMP/gripmock-upstream.pid"

          for _ in $(seq 1 60); do
            if GRPC_PORT="$GREETER_UPSTREAM_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent; then
              break
            fi
            sleep 1
          done

          GRPC_PORT="$GREETER_UPSTREAM_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent

      - name: Start proxy with -S flag (local descriptors)
        run: |
          GRPC_PORT="$GREETER_PROXY_PORT" HTTP_PORT="$GREETER_HTTP_PORT" \
            "$RUNNER_TEMP/gripmock" \
            -S examples/projects/greeter/service.proto \
            grpc+proxy://localhost:${GREETER_UPSTREAM_PORT} \
            >"$RUNNER_TEMP/gripmock-proxy.log" 2>&1 & echo $! >"$RUNNER_TEMP/gripmock-proxy.pid"

          for _ in $(seq 1 60); do
            if GRPC_PORT="$GREETER_PROXY_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent; then
              break
            fi
            sleep 1
          done

          GRPC_PORT="$GREETER_PROXY_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent

      - name: Verify service is registered via grpcurl
        run: |
          grpcurl -plaintext localhost:${GREETER_PROXY_PORT} list

      - name: Run grpctestify tests via proxy
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${GREETER_PROXY_PORT}" grpctestify -p 4 \
            examples/projects/greeter/case_say_hello_alex.gctf \
            examples/projects/greeter/case_say_hello_alex_headers.gctf

      - name: Stop servers
        if: always()
        run: |
          for pid_file in "$RUNNER_TEMP/gripmock-proxy.pid" "$RUNNER_TEMP/gripmock-upstream.pid"; do
            [ -f "$pid_file" ] && kill -INT "$(cat "$pid_file")" 2>/dev/null || true
          done
          sleep 1

      - name: Dump logs on failure
        if: failure()
        run: |
          for f in "$RUNNER_TEMP/gripmock-upstream.log" "$RUNNER_TEMP/gripmock-proxy.log"; do
            if [ -f "$f" ]; then
              echo "----- $f -----"
              cat "$f"
            fi
          done

  proxy-capture-local-sources-no-reflection:
    name: "Capture with Local Sources (no upstream reflection)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install grpctestify
        uses: gripmock/grpctestify-action@v1
        with:
          install-only: true
          version: ${{ env.GRPCTESTIFY_VERSION }}

      - name: Install grpcurl
        run: go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

      - name: Build gripmock binary
        run: |
          go build -o "$RUNNER_TEMP/gripmock" .

      - name: Start + check upstream examples server
        run: |
          GRPC_PORT="$GREETER_UPSTREAM_PORT" HTTP_PORT=0 "$RUNNER_TEMP/gripmock" -s examples/projects/greeter examples/projects/greeter >"$RUNNER_TEMP/gripmock-upstream.log" 2>&1 & echo $! >"$RUNNER_TEMP/gripmock-upstream.pid"

          for _ in $(seq 1 60); do
            if GRPC_PORT="$GREETER_UPSTREAM_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent; then
              break
            fi
            sleep 1
          done

          GRPC_PORT="$GREETER_UPSTREAM_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent

      - name: Start capture proxy with -S flag (local descriptors)
        run: |
          GRPC_PORT="$GREETER_PROXY_PORT" HTTP_PORT="$GREETER_HTTP_PORT" \
            "$RUNNER_TEMP/gripmock" \
            -S examples/projects/greeter/service.proto \
            grpc+capture://localhost:${GREETER_UPSTREAM_PORT} \
            >"$RUNNER_TEMP/gripmock-capture.log" 2>&1 & echo $! >"$RUNNER_TEMP/gripmock-capture.pid"

          for _ in $(seq 1 60); do
            if GRPC_PORT="$GREETER_PROXY_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent; then
              break
            fi
            sleep 1
          done

          GRPC_PORT="$GREETER_PROXY_PORT" "$RUNNER_TEMP/gripmock" check --timeout=1s --silent

      - name: Warm up capture
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${GREETER_PROXY_PORT}" grpctestify examples/projects/greeter --skip-tags sequential,effects

      - name: Stop upstream server
        run: |
          [ -f "$RUNNER_TEMP/gripmock-upstream.pid" ] && kill -INT "$(cat "$RUNNER_TEMP/gripmock-upstream.pid")" 2>/dev/null || true
          sleep 1

      - name: Replay from captured stubs
        run: |
          GRPCTESTIFY_ADDRESS="localhost:${GREETER_PROXY_PORT}" grpctestify examples/projects/greeter --skip-tags sequential,effects

      - name: Stop servers
        if: always()
        run: |
          for pid_file in "$RUNNER_TEMP/gripmock-capture.pid" "$RUNNER_TEMP/gripmock-upstream.pid"; do
            [ -f "$pid_file" ] && kill -INT "$(cat "$pid_file")" 2>/dev/null || true
          done
          sleep 1

      - name: Dump logs on failure
        if: failure()
        run: |
          for f in "$RUNNER_TEMP/gripmock-upstream.log" "$RUNNER_TEMP/gripmock-capture.log"; do
            if [ -f "$f" ]; then
              echo "----- $f -----"
              cat "$f"
            fi
          done