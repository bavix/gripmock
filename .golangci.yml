version: "2"
run:
  timeout: 5m
  go: "1.26"

linters:
  default: all
  disable:
    - gomodguard # deprecated, replated gomodguard_v2
    - wsl  # deprecated, replaced by wsl_v5
    - exhaustruct  # too strict for this project - requires all struct fields
    - revive  # too strict for this project - requires comments on all exported items
    - varnamelen  # too strict for this project - requires longer variable names
    - noinlineerr  # too strict for this project - requires separate error assignment
    - wrapcheck  # too strict for this project - requires wrapping all errors
    - gomoddirectives  # allow local replace for pkg/plugins
    - goconst # too strict for this project - requires big refactoring
  exclusions:
    rules:
      - path: "^pkg/.*"
        linters:
          - wsl_v5  # deprecated replacement of wsl
          - ireturn  # fluent builder pattern returns interfaces
          - err113   # test SDK uses fmt.Errorf
          - funcorder  # style preference
          - mnd     # test SDK uses magic numbers
          - contextcheck  # test SDK doesn't always need context
          - testpackage  # test SDK uses internal test packages
          - forcetypeassert  # test SDK uses type assertions
  settings:
    lll:
      tab-width: 1
      line-length: 140
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com
            - connectrpc.com
            - buf.build
            - google.golang.org
            - golang.org
            - go.opentelemetry.io

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - Standard
        - Default
        - Prefix(github.com/bavix)
